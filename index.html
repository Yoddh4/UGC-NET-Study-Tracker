<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UGC NET History Study Tracker</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-800 selection:bg-yellow-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- SVG Icon Components ---
        const IconAward = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></svg>;
        const IconClock = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
        const IconBookOpen = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>;
        const IconCalendar = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>;
        const IconCheckCircle2 = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;
        const IconCircle = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle></svg>;
        const IconAlertCircle = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>;
        const IconStickyNote = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V8Z"></path><path d="M15 3v4a2 2 0 0 0 2 2h4"></path></svg>;
        const IconFileText = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><line x1="10" y1="9" x2="8" y2="9"></line></svg>;

        const studyPlanData = [
          {
            day: 1,
            date: "June 14, 2026",
            historyUnit: "Unit I",
            historyTitle: "Ancient Sources & Early Societies",
            historyTopics: [
              "Archaeological & Literary Sources (Indigenous & Foreign)",
              "Pastoralism, Neolithic & Chalcolithic Phases",
              "Indus/Harappa Civilization (Origin, extent, decline, urbanization)",
              "Vedic & later Vedic periods (Aryan debates, Varnas, Iron Tech)",
              "Expansion of State system: Mahajanapadas"
            ],
            historyHighlights: [
              "Megaliths of South India.",
              "Republican States",
              "Ajivikas"
            ],
            historyStickyNotes: [
              "Maharashtra and Madhya Pradesh Daimabad etc."
            ],
            paper1Unit: "Unit-I",
            paper1Title: "Teaching Aptitude",
            paper1Topics: [
              "Teaching: Concept, Objectives, Levels (Memory, Understanding, Reflective)",
              "Learner's characteristics (Academic, Social, Emotional, Cognitive)",
              "Factors affecting teaching (Teacher, Learner, Environment, etc.)",
              "Methods of teaching (Teacher vs Learner centred, Online vs Offline)",
              "Teaching Support & Evaluation Systems (CBCS, CBT, Innovations)"
            ]
          },
          {
            day: 2,
            date: "June 15, 2026",
            historyUnit: "Unit II",
            historyTitle: "Empires & Regional Powers",
            historyTopics: [
              "Rise of Magadha, Mauryan expansion, Asoka’s Dhamma",
              "Trade & commerce from 2nd century BCE to 3rd century CE",
              "Gupta Vakataka age: Polity, Economy, Land Grants",
              "Harsha and his Times: Administration and Religion"
            ],
            historyHighlights: [
              "Emergence of Regional Powers: Indo-Greeks, Sungas, Satavahanas, Kushanas and Saka-Ksatrapas",
              "Sangam literature",
              "Kharavela",
              "Beginning of Temple Architecture, Emergence of Puranic Hinduism",
              "Salankayanas and Visnukundins in Andhradesa."
            ],
            paper1Unit: "Unit-II",
            paper1Title: "Research Aptitude",
            paper1Topics: [
              "Research: Meaning, Types, Characteristics, Positivism approach",
              "Methods of Research (Experimental, Descriptive, Historical, etc.)",
              "Steps of Research",
              "Thesis and Article writing (Format and referencing)",
              "Application of ICT in research & Research ethics"
            ]
          },
          {
            day: 3,
            date: "June 16, 2026",
            historyUnit: "Unit III",
            historyTitle: "Early Medieval India",
            historyTopics: [
              "Characteristics of Early Medieval India (Admin, Political Structure)",
              "Agrarian economy, land grants, water resources",
              "Trade, urbanization, trade guilds, colonization in SE Asia",
              "Growth of Brahminical religions, Society, Varna, Jati",
              "Education & Educational Institutions, Arab contracts"
            ],
            historyHighlights: [
              "Emergence of Regional Kingdoms: Deccan, South, Eastern, Western, and North India.",
              "Debates of state formation in early medieval India: A) Feudal model; B) Segmentary model; C) Integrative model"
            ],
            paper1Unit: "Unit-III",
            paper1Title: "Comprehension",
            paper1Topics: [
              "Practicing reading comprehension passages",
              "Answering questions directly and inferentially based on text"
            ]
          },
          {
            day: 4,
            date: "June 17, 2026",
            historyUnit: "Unit IV",
            historyTitle: "Medieval Political History",
            historyTopics: [
              "Source of Medieval Indian History (Material, Chronicles, Travellers)",
              "Delhi Sultanate: Ghorids, Turks, Khaljis, Tughlaqs, Decline",
              "Foundation of Mughal Empire, Expansion from Akbar to Aurangzeb",
              "Rise of the Marathas & foundation of Swaraj by Shivaji"
            ],
            historyHighlights: [
              "Daftar Khannas: Firmans, Bahis / Pothis / Akhbarat;",
              "theSayyids and the Lodis.",
              "The Vijayanagara and the Bahmanis",
              "Mughal – Maratha relations, Maratha Confederacy"
            ],
            paper1Unit: "Unit-IV",
            paper1Title: "Communication",
            paper1Topics: [
              "Communication: Meaning, types and characteristics",
              "Effective communication (Verbal/Non-verbal, Inter-Cultural, Classroom)",
              "Barriers to effective communication",
              "Mass-Media and Society"
            ]
          },
          {
            day: 5,
            date: "June 18, 2026",
            historyUnit: "Unit V",
            historyTitle: "Medieval Administration & Economy",
            historyTopics: [
              "Administration under Sultanate & Mughals (Mansabdari, Jagirdari)",
              "Bahamani & Vijayanagara Administrative System",
              "Frontier Policies & Inter-State Relations",
              "Agricultural Production, Irrigation, Village Economy",
              "Industries, Agro-Based industries"
            ],
            historyHighlights: [
              "Law of succession.",
              "Sher Shah’s Administrative Reforms",
              "Asta Pradhan.",
              "European Trade, Trade Centres and Ports",
              "Hundi (Bills of Exchange) and Insurance"
            ],
            historyStickyNotes: [
              "Mughal succession after 1707",
              "Jahangir's Paining Interest"
            ],
            paper1Unit: "Unit-V",
            paper1Title: "Mathematical Reasoning and Aptitude",
            paper1Topics: [
              "Types of reasoning",
              "Number series, Letter series, Codes and Relationships",
              "Mathematical Aptitude (Fraction, Time & Distance, Ratio, Proportion)",
              "Percentage, Profit and Loss, Interest and Discounting, Averages"
            ]
          },
          {
            day: 6,
            date: "June 19, 2026",
            historyUnit: "Unit VI",
            historyTitle: "Medieval Society & Culture",
            historyTopics: [
              "Social Organisation and Social Structure",
              "The Sufis & Bhakti Movement (Shaivism, Vaishnavism, Shaktism)",
              "The Sikh Movement: Guru Nanak Dev, Adi Granth, Khalsa",
              "Rural society, Artisans, Position of Women (Zanana, Devadasi)",
              "Fine Arts, Indo-Islamic Architecture"
            ],
            historyHighlights: [
              "the Ulemas, the Mercantile and Professional Classes – Rajput Society.",
              "Maratha Forts"
            ],
            paper1Unit: "Unit-VI",
            paper1Title: "Logical Reasoning",
            paper1Topics: [
              "Structure of arguments, categorical propositions, Fallacies",
              "Deductive and inductive reasoning, Analogies, Venn diagrams",
              "Indian Logic: Means of knowledge",
              "Pramanas (Pratyaksha, Anumana, Upamana, Shabda, etc.)",
              "Structure and kinds of Anumana, Vyapti, Hetvabhasas"
            ]
          },
          {
            day: 7,
            date: "June 20, 2026",
            historyUnit: "Unit VII",
            historyTitle: "Modern Sources & Early British Rule",
            historyTopics: [
              "Sources of Modern Indian History (Archives, Biographies)",
              "Rise of British Power (European Traders)",
              "Establishment and Expansion of British Dominion",
              "Administration of Company and Crown, Civil Service, Judiciary",
              "Local Self-Government, Constitutional Changes (1909 - 1935)"
            ],
            historyHighlights: [
              "British Relations with Principal Indian States – Bengal, Oudh, Hyderabad, Mysore, Carnatic and Punjab.",
              "Revolt of 1857"
            ],
            historyStickyNotes: [
              "Leaders and Location and a rough timeline of 1857 Revolt"
            ],
            paper1Unit: "Unit-VII",
            paper1Title: "Data Interpretation",
            paper1Topics: [
              "Sources, acquisition and classification of Data",
              "Quantitative and Qualitative Data",
              "Graphical representation (Bar/Pie/Line charts, Histograms)",
              "Data Interpretation Techniques",
              "Data and Governance"
            ]
          },
          {
            day: 8,
            date: "June 21, 2026",
            historyUnit: "Unit VIII",
            historyTitle: "Colonial Economy & Society",
            historyTopics: [
              "Colonial Economy, Commercialization of Agriculture",
              "Decline of Industries, Economic Drain",
              "Monetary Policy, Banking, Railways",
              "Tribal and Peasant Movements",
              "Indian Society in Transition, New Education, Public Health",
              "Indian Renaissance, Women's Question, Social Reforms"
            ],
            historyHighlights: [
              "British Industrial Policy; Major Modern Industries; Nature of Factory Legislation; Labour and Trade Union Movements.",
              "Famines, Epidemics and the Government Policy.",
              "The Printing Press – Journalistic Activity and the Public opinion."
            ],
            paper1Unit: "Unit-VIII",
            paper1Title: "Information and Communication Technology (ICT)",
            paper1Topics: [
              "ICT: General abbreviations and terminology",
              "Basics of Internet, Intranet, E-mail, Audio and Video-conferencing",
              "Digital initiatives in higher education",
              "ICT and Governance"
            ]
          },
          {
            day: 9,
            date: "June 22, 2026",
            historyUnit: "Unit IX",
            historyTitle: "Indian National Movement & Post-Independence",
            historyTopics: [
              "Rise of Indian Nationalism, INC (1885-1920)",
              "Left Wing Politics, Depressed Class Movement",
              "Communal Politics, Partition, Integration of Princely States",
              "B.R. Ambedkar & Making of the Constitution",
              "Bureaucracy, New Education Policy, Linguistic Reorganisation"
            ],
            historyHighlights: [
              "Swadeshi and Swaraj.",
              "Gandhian Mass Movements;",
              "Subas Chandra Bose and INA;",
              "Women Participation in National Movement.",
              "Economic Policies and the Planning process; Development, Displacement and Tribal Issues.",
              "Panchsheel;"
            ],
            paper1Unit: "Unit-IX",
            paper1Title: "People, Development and Environment",
            paper1Topics: [
              "MDGs and Sustainable development goals (SDGs)",
              "Human and environment interaction, impacts of pollutants",
              "Environmental issues (Air, Water, Soil, Climate change)",
              "Natural and energy resources, Natural hazards mitigation",
              "Environmental Protection Act, National Action Plan, Int. agreements"
            ]
          },
          {
            day: 10,
            date: "June 23, 2026",
            historyUnit: "Unit X",
            historyTitle: "Historical Method & Historiography",
            historyTopics: [
              "Scope, Importance, Objectivity and Bias in History",
              "History as Science/Arts/Social Science, Causation",
              "Research Methodology, Hypothesis, Sources, Data Collection",
              "Trends in Research, Plagiarism, Thesis Writing",
              "Historiography: Greek, Roman, Church, Renaissance",
              "Philosophies: Marxist, Cyclical, Challenge and Response, Post-Modernism"
            ],
            historyHighlights: [
              "Heuristics Operation"
            ],
            historyStickyNotes: [
              "Hermaneutics & Heuristics Operations"
            ],
            paper1Unit: "Unit-X",
            paper1Title: "Higher Education System",
            paper1Topics: [
              "Institutions of higher learning and education in ancient India",
              "Evolution of higher learning and research in Post Independence India",
              "Oriental, Conventional and Non-conventional learning programmes",
              "Professional, Technical and Skill Based education",
              "Value education and environmental education",
              "Policies, Governance, and Administration"
            ]
          }
        ];

        function App() {
          const [completedDays, setCompletedDays] = useState({});
          const [progress, setProgress] = useState(0);

          // Load state from local storage on mount
          useEffect(() => {
            const saved = localStorage.getItem('ugcNetHistoryProgress');
            if (saved) {
              try {
                setCompletedDays(JSON.parse(saved));
              } catch (e) {
                console.error("Could not parse saved progress");
              }
            }
          }, []);

          // Save state to local storage and update progress
          useEffect(() => {
            localStorage.setItem('ugcNetHistoryProgress', JSON.stringify(completedDays));
            const completedCount = Object.values(completedDays).filter(Boolean).length;
            setProgress((completedCount / studyPlanData.length) * 100);
          }, [completedDays]);

          const toggleDay = (dayId) => {
            setCompletedDays(prev => ({
              ...prev,
              [dayId]: !prev[dayId]
            }));
          };

          return (
            <div>
              {/* Header Section */}
              <header className="bg-slate-900 text-white py-10 px-6 shadow-xl sticky top-0 z-50">
                <div className="max-w-5xl mx-auto">
                  <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                    <div>
                      <div className="flex items-center gap-3 mb-2">
                        <IconAward className="w-8 h-8 text-yellow-400" />
                        <h1 className="text-3xl font-bold tracking-tight">UGC NET History Master Plan</h1>
                      </div>
                      <p className="text-slate-300 text-sm md:text-base flex items-center gap-2">
                        <IconClock className="w-4 h-4" /> Exam Date: June 25, 2026 (Shift 2) &bull; Revision Starts: Tomorrow
                      </p>
                    </div>
                    
                    {/* Progress Indicator */}
                    <div className="bg-slate-800 rounded-xl p-4 w-full md:w-64 border border-slate-700">
                      <div className="flex justify-between text-sm font-semibold mb-2">
                        <span className="text-slate-300">Readiness</span>
                        <span className="text-yellow-400">{Math.round(progress)}%</span>
                      </div>
                      <div className="w-full bg-slate-700 rounded-full h-2.5">
                        <div 
                          className="bg-yellow-400 h-2.5 rounded-full transition-all duration-500 ease-out" 
                          style={{ width: `${progress}%` }}
                        ></div>
                      </div>
                      <p className="text-xs text-slate-400 mt-2 text-center">
                        {Object.values(completedDays).filter(Boolean).length} of 10 Units Completed
                      </p>
                    </div>
                  </div>
                </div>
              </header>

              {/* Main Content Container */}
              <main className="max-w-5xl mx-auto px-6 py-12">
                <div className="mb-10 bg-blue-50 border border-blue-100 rounded-xl p-6 text-blue-800 shadow-sm">
                  <h3 className="font-bold text-lg mb-2 flex items-center gap-2">
                    <IconBookOpen className="w-5 h-5 text-blue-600" />
                    How to use this tracker
                  </h3>
                  <p className="text-sm">
                    This tracker focuses heavily on your previous revision notes. General topics are listed for standard review, while <strong className="bg-yellow-200 px-1 rounded text-slate-900">highlighted items</strong> require special emphasis as marked in your syllabus. Don't forget to check the <strong>Sticky Notes</strong> for your personalized reminders!
                  </p>
                </div>

                {/* Study Plan Grid */}
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                  {studyPlanData.map((dayPlan) => {
                    const isCompleted = completedDays[dayPlan.day];
                    
                    return (
                      <div 
                        key={dayPlan.day} 
                        className={`relative rounded-2xl p-6 border-2 transition-all duration-300 flex flex-col ${
                          isCompleted 
                            ? 'bg-slate-100 border-slate-200 opacity-80' 
                            : 'bg-white border-slate-200 shadow-lg hover:shadow-xl hover:border-blue-300'
                        }`}
                      >
                        {/* Header of the Card */}
                        <div className="flex justify-between items-start mb-4 border-b border-slate-100 pb-4">
                          <div>
                            <div className="flex items-center gap-2 mb-2">
                              <span className="px-3 py-1 bg-slate-900 text-white text-xs font-bold rounded-full uppercase tracking-wider">
                                Day {dayPlan.day}
                              </span>
                              <span className="text-sm font-semibold text-slate-500 flex items-center gap-1">
                                <IconCalendar className="w-3 h-3" />
                                {dayPlan.date}
                              </span>
                            </div>
                            <h2 className="text-lg font-bold text-slate-800 leading-snug">
                              <span className="text-yellow-600">History:</span> {dayPlan.historyTitle}
                            </h2>
                            <h2 className="text-md font-bold text-slate-600 mt-1 flex items-center gap-1">
                              <span className="text-blue-500"><IconFileText className="w-4 h-4 inline-block -mt-1"/> Paper 1:</span> {dayPlan.paper1Title}
                            </h2>
                          </div>
                          
                          {/* Completion Toggle */}
                          <button 
                            onClick={() => toggleDay(dayPlan.day)}
                            className="focus:outline-none shrink-0 ml-4 group"
                            aria-label={`Mark Day ${dayPlan.day} as completed`}
                          >
                            {isCompleted ? (
                              <IconCheckCircle2 className="w-8 h-8 text-green-500 group-hover:text-green-600 transition-colors" />
                            ) : (
                              <IconCircle className="w-8 h-8 text-slate-300 group-hover:text-slate-400 transition-colors" />
                            )}
                          </button>
                        </div>

                        {/* Card Content Body */}
                        <div className={`space-y-6 flex-grow ${isCompleted ? 'grayscale opacity-60' : ''}`}>
                          
                          {/* Paper 2: History Content */}
                          <div className="relative pl-4 border-l-4 border-yellow-400">
                            <h3 className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">
                              History Syllabus ({dayPlan.historyUnit})
                            </h3>
                            <ul className="space-y-2">
                              {dayPlan.historyTopics.map((topic, i) => (
                                <li key={i} className="flex items-start gap-2 text-sm text-slate-600 leading-relaxed">
                                  <span className="w-1.5 h-1.5 rounded-full bg-slate-300 mt-1.5 shrink-0"></span>
                                  <span>{topic}</span>
                                </li>
                              ))}
                            </ul>

                            {/* Highlights Area */}
                            {dayPlan.historyHighlights && dayPlan.historyHighlights.length > 0 && (
                              <div className="mt-4 bg-yellow-50/50 border border-yellow-100 rounded-xl p-3">
                                <h3 className="text-[10px] font-bold text-yellow-800 uppercase tracking-wider mb-2 flex items-center gap-1">
                                  <IconAlertCircle className="w-3 h-3" /> Priority Highlights
                                </h3>
                                <ul className="space-y-2">
                                  {dayPlan.historyHighlights.map((highlight, i) => (
                                    <li key={i} className="text-xs leading-relaxed text-slate-800">
                                      <span className="bg-yellow-200/80 px-1 py-0.5 rounded box-decoration-clone leading-relaxed shadow-sm">
                                        {highlight}
                                      </span>
                                    </li>
                                  ))}
                                </ul>
                              </div>
                            )}

                            {/* Personal Sticky Notes */}
                            {dayPlan.historyStickyNotes && dayPlan.historyStickyNotes.length > 0 && (
                              <div className="mt-3 bg-amber-100 border border-amber-200 rounded-lg p-3 transform rotate-1 shadow-sm">
                                <h3 className="text-[10px] font-bold text-amber-900 uppercase tracking-wider mb-1 flex items-center gap-1">
                                  <IconStickyNote className="w-3 h-3" /> Sticky Notes
                                </h3>
                                <ul className="space-y-1">
                                  {dayPlan.historyStickyNotes.map((note, i) => (
                                    <li key={i} className="text-xs text-amber-950 italic font-medium">
                                      &bull; {note}
                                    </li>
                                  ))}
                                </ul>
                              </div>
                            )}
                          </div>

                          {/* Paper 1 Content */}
                          <div className="relative pl-4 border-l-4 border-blue-400 bg-blue-50/30 py-2 pr-2 rounded-r-lg">
                             <h3 className="text-xs font-bold text-blue-900 uppercase tracking-wider mb-3">
                              Paper 1 Syllabus ({dayPlan.paper1Unit})
                            </h3>
                            <ul className="space-y-2">
                                {dayPlan.paper1Topics.map((topic, i) => (
                                  <li key={i} className="flex items-start gap-2 text-sm text-slate-700 leading-relaxed">
                                    <IconFileText className="w-3.5 h-3.5 text-blue-400 mt-0.5 shrink-0" />
                                    <span>{topic}</span>
                                  </li>
                                ))}
                            </ul>
                          </div>

                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* Outro section */}
                <div className="mt-12 text-center text-slate-500 text-sm">
                  <p>Rest day scheduled for June 24, 2026. Good luck with your revision!</p>
                </div>
              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
